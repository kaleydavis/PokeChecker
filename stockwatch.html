<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StockWatch">
<meta name="theme-color" content="#050a14">
<title>StockWatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a14;
    --surface: #0b1220;
    --border: #1a2540;
    --accent: #00ff88;
    --accent-dim: #00ff8822;
    --warn: #ff6b35;
    --muted: #3a4a6a;
    --text: #c8d8f0;
    --text-bright: #e8f0ff;
    --red: #ff4060;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
    padding-top: var(--safe-top);
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; min-height: -webkit-fill-available; }

  /* ── Header ── */
  header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(5,10,20,0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--text-bright);
    letter-spacing: -0.02em;
    flex: 1;
  }
  .logo span { color: var(--accent); }

  .pulse-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: breathe 2s ease-in-out infinite;
  }

  .badge {
    background: var(--accent);
    color: #000;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 99px;
    letter-spacing: 0.05em;
  }

  .notif-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--warn);
    font-family: inherit;
    font-size: 11px;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }

  /* ── Main content ── */
  main { flex: 1; overflow-y: auto; padding: 16px 16px 100px; }

  /* ── Empty state ── */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    gap: 12px;
    text-align: center;
  }
  .empty-icon { font-size: 48px; opacity: 0.4; }
  .empty h2 { font-family: 'Syne', sans-serif; font-size: 16px; color: var(--muted); letter-spacing: 0.05em; }
  .empty p { font-size: 11px; color: #1e2e4a; max-width: 200px; }

  /* ── Tracker cards ── */
  .trackers { display: flex; flex-direction: column; gap: 12px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.4s;
  }
  .card.in-stock { border-color: #00ff8844; }
  .card.in-stock::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,255,136,0.07) 0%, transparent 60%);
    pointer-events: none;
  }

  .card-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.idle         { background: var(--muted); }
  .status-dot.checking     { background: #f59e0b; animation: breathe 0.8s infinite; }
  .status-dot.in_stock     { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
  .status-dot.out_of_stock { background: var(--red); }
  .status-dot.error        { background: var(--warn); }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-bright);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .status-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }
  .status-label.idle         { color: var(--muted); }
  .status-label.checking     { color: #f59e0b; }
  .status-label.in_stock     { color: var(--accent); }
  .status-label.out_of_stock { color: var(--red); }
  .status-label.error        { color: var(--warn); }

  .card-reason {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
    padding-left: 18px;
    line-height: 1.4;
  }

  .card-error {
    background: rgba(255,64,96,0.08);
    border: 1px solid rgba(255,64,96,0.2);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 11px;
    color: var(--red);
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .card-meta {
    font-size: 10px;
    color: #253550;
    display: flex;
    gap: 14px;
    margin-bottom: 10px;
  }
  .card-meta .paused { color: #f59e0b; }

  .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .ghost-btn {
    background: transparent;
    border: 1px solid;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    padding: 7px 12px;
    border-radius: 5px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.15s;
  }
  .ghost-btn:active { opacity: 0.6; }
  .ghost-btn.grey   { border-color: #1e2e4a; color: var(--muted); }
  .ghost-btn.yellow { border-color: #f59e0b55; color: #f59e0b; }
  .ghost-btn.green  { border-color: #00ff8855; color: var(--accent); }
  .ghost-btn.red    { border-color: #ff406055; color: var(--red); margin-left: auto; }

  /* ── Add form (sheet) ── */
  .sheet-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 200;
    align-items: flex-end;
  }
  .sheet-overlay.open { display: flex; }

  .sheet {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px calc(20px + var(--safe-bottom));
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
    animation: slideUp 0.3s cubic-bezier(0.34,1.2,0.64,1);
  }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 99px;
    margin: 0 auto 4px;
  }

  .sheet-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--text-bright);
    letter-spacing: -0.01em;
  }

  .field-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  input[type="text"], input[type="url"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-bright);
    font-family: inherit;
    font-size: 14px;
    padding: 13px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: #253550; }

  .interval-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .interval-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    padding: 12px 0;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .interval-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .start-btn {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #000;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    padding: 16px;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: opacity 0.15s;
  }
  .start-btn:disabled { opacity: 0.3; cursor: default; }
  .start-btn:not(:disabled):active { opacity: 0.8; }

  /* ── Log panel ── */
  .log-panel { display: flex; flex-direction: column; gap: 6px; }
  .log-title {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .log-empty { text-align: center; padding: 40px 0; color: #1e2e4a; font-size: 12px; }

  .log-entry {
    font-size: 11px;
    line-height: 1.5;
    padding: 4px 0 4px 10px;
    border-left: 2px solid;
  }
  .log-entry.info    { border-color: var(--border); color: var(--muted); }
  .log-entry.success { border-color: var(--accent); color: var(--accent); }
  .log-entry.error   { border-color: var(--red); color: #ff8090; }
  .log-time { color: #253550; margin-right: 8px; font-size: 10px; }

  /* ── Bottom nav ── */
  nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: rgba(5,10,20,0.95);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 100;
  }

  .nav-btn {
    flex: 1;
    background: transparent;
    border: none;
    border-top: 2px solid transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 10px 0 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: color 0.15s, border-color 0.15s;
  }
  .nav-btn.active { color: var(--accent); border-top-color: var(--accent); }
  .nav-btn .nav-icon { font-size: 20px; }

  /* ── Install banner ── */
  .install-banner {
    background: linear-gradient(135deg, #0b1a0f, #0a1420);
    border: 1px solid #00ff8830;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .install-banner .icon { font-size: 24px; flex-shrink: 0; }
  .install-banner h3 { font-family: 'Syne', sans-serif; font-size: 13px; color: var(--accent); margin-bottom: 4px; }
  .install-banner p { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .install-banner strong { color: var(--text); }
  .dismiss-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 0 0 0 8px;
    flex-shrink: 0;
    line-height: 1;
  }

  @keyframes breathe {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="pulse-dot"></div>
    <div class="logo">Stock<span>Watch</span></div>
    <div id="inStockBadge" class="badge" style="display:none"></div>
    <button class="notif-btn" id="notifBtn" style="display:none" onclick="askNotif()">🔔 Alerts</button>
    <span id="notifOn" style="display:none;font-size:11px;color:var(--accent)">🔔 On</span>
  </header>

  <main id="main">
    <!-- content swapped by JS -->
  </main>

  <!-- Add sheet -->
  <div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet(event)">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Add Tracker</div>

      <div>
        <div class="field-label">PRODUCT URL</div>
        <input type="url" id="urlInput" placeholder="https://www.samsclub.com/ip/..." oninput="onUrlChange()">
      </div>
      <div>
        <div class="field-label">NICKNAME (OPTIONAL)</div>
        <input type="text" id="nameInput" placeholder="e.g. Prismatic Evolutions">
      </div>
      <div>
        <div class="field-label">CHECK EVERY</div>
        <div class="interval-grid" id="intervalGrid">
          <button class="interval-btn" data-ms="30000" onclick="pickInterval(this)">30s</button>
          <button class="interval-btn active" data-ms="60000" onclick="pickInterval(this)">1m</button>
          <button class="interval-btn" data-ms="300000" onclick="pickInterval(this)">5m</button>
          <button class="interval-btn" data-ms="900000" onclick="pickInterval(this)">15m</button>
        </div>
      </div>
      <button class="start-btn" id="startBtn" disabled onclick="addTracker()">START TRACKING</button>
    </div>
  </div>

  <nav>
    <button class="nav-btn active" id="nav-watch" onclick="setTab('watch')">
      <span class="nav-icon">📦</span>
      <span id="nav-watch-label">WATCH</span>
    </button>
    <button class="nav-btn" id="nav-add" onclick="openSheet()">
      <span class="nav-icon">＋</span>
      ADD
    </button>
    <button class="nav-btn" id="nav-log" onclick="setTab('log')">
      <span class="nav-icon">📋</span>
      <span id="nav-log-label">LOG</span>
    </button>
  </nav>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let trackers = JSON.parse(localStorage.getItem('sw_trackers') || '[]');
let log      = JSON.parse(localStorage.getItem('sw_log') || '[]');
let timers   = {};
let tab      = 'watch';
let pollMs   = 60000;
let notifPerm = typeof Notification !== 'undefined' ? Notification.permission : 'default';
let bannerDismissed = localStorage.getItem('sw_banner') === '1';

function save() {
  localStorage.setItem('sw_trackers', JSON.stringify(trackers));
  localStorage.setItem('sw_log', JSON.stringify(log.slice(0, 80)));
}

function pushLog(msg, type = 'info') {
  log.unshift({ msg, type, ts: Date.now() });
  log = log.slice(0, 80);
  save();
  if (tab === 'log') render();
  updateNav();
}

function fmt(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// ── Stock checking ─────────────────────────────────────────────────────────
const OUT_PHRASES = ['out of stock','sold out','currently unavailable','not available','notify me when available','coming soon','not yet released','unavailable online'];
const IN_PHRASES  = ['add to cart','add to bag','buy now','in stock','in-stock','available to ship','order now','pick up today','check nearby','add to club'];

function getSamsClubItemId(url) {
  const m = url.match(/\/ip\/[^/]*?(\d{8,})/);
  return m ? m[1] : null;
}

async function fetchWithProxy(url) {
  const proxies = [
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  ];
  for (const proxy of proxies) {
    try {
      const res = await fetch(proxy, { signal: AbortSignal.timeout(14000) });
      if (res.ok) {
        const text = await res.text();
        if (text && text.length > 200) return text;
      }
    } catch (_) {}
  }
  return null;
}

async function checkStock(tracker) {
  const url = tracker.url;

  // Sam's Club: try their product API directly
  const scId = getSamsClubItemId(url);
  if (scId) {
    try {
      const apiUrl = `https://www.samsclub.com/api/node/vivaldi/v2/products/details?productId=${scId}&clubId=6279&channel=WEB`;
      const text = await fetchWithProxy(apiUrl);
      if (text) {
        const raw = text.toLowerCase();
        const out = ['out of stock','unavailable','oos','not available'].some(p => raw.includes(p));
        const ins = ['addtocart','add_to_cart','add to cart','in stock','instock'].some(p => raw.includes(p));
        if (out) return { status: 'out_of_stock', reason: "Sam's Club API: not in stock" };
        if (ins) return { status: 'in_stock', reason: "Sam's Club API: available!" };
      }
    } catch (_) {}
  }

  // Fallback: fetch the page HTML
  const html = await fetchWithProxy(url);
  if (html) {
    const text = html.toLowerCase();
    for (const p of OUT_PHRASES) {
      if (text.includes(p)) return { status: 'out_of_stock', reason: `Page says "${p}"` };
    }
    for (const p of IN_PHRASES) {
      if (text.includes(p)) return { status: 'in_stock', reason: `Page says "${p}"` };
    }
    return { status: 'unknown', reason: 'Page loaded — no clear stock signal yet' };
  }

  throw new Error("Sam's Club is blocking all proxies. The tracker will keep retrying.");
}

async function runCheck(id) {
  const t = trackers.find(x => x.id === id);
  if (!t) return;

  t.status = 'checking';
  t.lastError = null;
  save(); render();

  try {
    const result = await checkStock(t);
    const prev = t.status;
    t.status = result.status;
    t.lastChecked = Date.now();
    t.checkCount = (t.checkCount || 0) + 1;
    t.lastReason = result.reason;
    t.lastError = null;
    save(); render();

    pushLog(`${t.name}: ${result.status.replace('_',' ')} — ${result.reason}`,
      result.status === 'in_stock' ? 'success' : 'info');

    if (result.status === 'in_stock' && prev !== 'in_stock' && notifPerm === 'granted') {
      new Notification('IN STOCK: ' + t.name, { body: '🛒 Go grab it now!', icon: '/favicon.ico' });
    }
  } catch (err) {
    t.status = 'error';
    t.lastChecked = Date.now();
    t.checkCount = (t.checkCount || 0) + 1;
    t.lastError = err.message;
    save(); render();
    pushLog(`${t.name}: ❌ ${err.message}`, 'error');
  }
}

// ── Polling ────────────────────────────────────────────────────────────────
function startPolling(id) {
  const t = trackers.find(x => x.id === id);
  if (!t) return;
  stopPolling(id);
  runCheck(id);
  timers[id] = setInterval(() => runCheck(id), t.pollMs);
}

function stopPolling(id) {
  clearInterval(timers[id]);
  delete timers[id];
}

// Resume all active trackers on load
trackers.filter(t => !t.paused).forEach(t => startPolling(t.id));

// ── Actions ────────────────────────────────────────────────────────────────
function addTracker() {
  const url = document.getElementById('urlInput').value.trim();
  const name = document.getElementById('nameInput').value.trim();
  if (!url) return;

  let label = name;
  if (!label) {
    try { label = new URL(url).hostname.replace('www.','') + ' product'; }
    catch { label = 'Product'; }
  }

  const t = { id: String(Date.now()), url, name: label, pollMs, status: 'idle', lastChecked: null, checkCount: 0, lastError: null, lastReason: null, paused: false };
  trackers.push(t);
  save();

  document.getElementById('urlInput').value = '';
  document.getElementById('nameInput').value = '';
  document.getElementById('startBtn').disabled = true;
  closeSheet();
  setTab('watch');
  pushLog(`Added tracker: ${label}`);
  startPolling(t.id);
}

function removeTracker(id) {
  stopPolling(id);
  trackers = trackers.filter(t => t.id !== id);
  save(); render();
}

function toggleTracker(id) {
  const t = trackers.find(x => x.id === id);
  if (!t) return;
  if (t.paused) {
    t.paused = false;
    save();
    startPolling(id);
  } else {
    t.paused = true;
    stopPolling(id);
    save(); render();
  }
}

// ── Notifications ──────────────────────────────────────────────────────────
async function askNotif() {
  notifPerm = await Notification.requestPermission();
  updateHeader();
}

// ── Sheet ──────────────────────────────────────────────────────────────────
function openSheet() {
  document.getElementById('sheetOverlay').classList.add('open');
  setTimeout(() => document.getElementById('urlInput').focus(), 300);
}
function closeSheet(e) {
  if (!e || e.target === document.getElementById('sheetOverlay')) {
    document.getElementById('sheetOverlay').classList.remove('open');
  }
}
function onUrlChange() {
  document.getElementById('startBtn').disabled = !document.getElementById('urlInput').value.trim();
}
function pickInterval(btn) {
  document.querySelectorAll('.interval-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  pollMs = parseInt(btn.dataset.ms);
}

// ── Tab / nav ──────────────────────────────────────────────────────────────
function setTab(t) {
  tab = t;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + t)?.classList.add('active');
  render();
}

function updateNav() {
  const wl = document.getElementById('nav-watch-label');
  const ll = document.getElementById('nav-log-label');
  if (wl) wl.textContent = trackers.length ? `WATCH (${trackers.length})` : 'WATCH';
  if (ll) ll.textContent = log.length ? `LOG (${log.length})` : 'LOG';
}

function updateHeader() {
  const badge = document.getElementById('inStockBadge');
  const n = trackers.filter(t => t.status === 'in_stock').length;
  if (n > 0) { badge.style.display = ''; badge.textContent = n + ' IN STOCK'; }
  else { badge.style.display = 'none'; }

  document.getElementById('notifBtn').style.display = notifPerm !== 'granted' ? '' : 'none';
  document.getElementById('notifOn').style.display  = notifPerm === 'granted'  ? '' : 'none';
}

// ── Render ─────────────────────────────────────────────────────────────────
const STATUS_LABEL = { idle:'NOT CHECKED', checking:'CHECKING…', in_stock:'IN STOCK ✓', out_of_stock:'OUT OF STOCK', error:'ERROR' };

function render() {
  updateHeader();
  updateNav();
  const main = document.getElementById('main');

  if (tab === 'watch') {
    let html = '';

    // Install banner
    if (!bannerDismissed) {
      html += `<div class="install-banner">
        <div class="icon">📲</div>
        <div>
          <h3>Add to Home Screen</h3>
          <p>Tap <strong>Share ↑</strong> then <strong>"Add to Home Screen"</strong> to use StockWatch as a phone app with notifications.</p>
        </div>
        <button class="dismiss-btn" onclick="dismissBanner()">×</button>
      </div>`;
    }

    if (trackers.length === 0) {
      html += `<div class="empty">
        <div class="empty-icon">📦</div>
        <h2>NO TRACKERS YET</h2>
        <p>Tap + ADD below to start monitoring a product</p>
      </div>`;
    } else {
      html += '<div class="trackers">';
      for (const t of trackers) {
        const st = t.status || 'idle';
        html += `<div class="card ${st === 'in_stock' ? 'in-stock' : ''}">
          <div class="card-top">
            <div class="status-dot ${st}"></div>
            <div class="card-name">${esc(t.name)}</div>
            <div class="status-label ${st}">${STATUS_LABEL[st] || st}</div>
          </div>`;

        if (t.lastError) {
          html += `<div class="card-error">⚠ ${esc(t.lastError)}</div>`;
        } else if (t.lastReason) {
          html += `<div class="card-reason">${esc(t.lastReason)}</div>`;
        }

        html += `<div class="card-meta">
            <span>Checks: ${t.checkCount || 0}</span>
            <span>Last: ${fmt(t.lastChecked)}</span>
            ${t.paused ? '<span class="paused">PAUSED</span>' : ''}
          </div>
          <div class="card-actions">
            <button class="ghost-btn grey" onclick="runCheck('${t.id}')">↻ Check</button>
            <button class="ghost-btn ${t.paused ? 'green' : 'yellow'}" onclick="toggleTracker('${t.id}')">${t.paused ? '▶ Resume' : '⏸ Pause'}</button>
            <button class="ghost-btn red" onclick="removeTracker('${t.id}')">✕</button>
          </div>
        </div>`;
      }
      html += '</div>';
    }
    main.innerHTML = html;
  }

  else if (tab === 'log') {
    let html = '<div class="log-panel"><div class="log-title">ACTIVITY LOG</div>';
    if (log.length === 0) {
      html += '<div class="log-empty">No activity yet</div>';
    } else {
      for (const e of log) {
        html += `<div class="log-entry ${e.type}"><span class="log-time">${fmt(e.ts)}</span>${esc(e.msg)}</div>`;
      }
    }
    html += '</div>';
    main.innerHTML = html;
  }
}

function dismissBanner() {
  bannerDismissed = true;
  localStorage.setItem('sw_banner', '1');
  render();
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
render();
</script>
</body>
</html>
